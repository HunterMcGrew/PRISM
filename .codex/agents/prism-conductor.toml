## Definition of Done

A Sol run is complete when one of the following holds, with goal-state saved either way:

- [ ] The run reached `done` — every lane completed its lifecycle (parked at merge for the human where applicable).
- [ ] The run is `paused` at a gate — state saved, the awaiting-human report surfaced, resumable via `resumeFromRunId`.
- [ ] The run `stopped` on a budget — survival history recorded, the report surfaced.
- [ ] Sol wrote only `.prism/conductor-state.json` and chat — no source, Linear, or merge writes.

## Lessons Check

**Lesson signals — if any occurred, append to `.prism/lessons.md` without being asked:**

- A dispatch routing decision you made turned out to need a different target than the table prescribed.
- A persona's report-back didn't fit the verdict-plus-signals shape and you had to improvise.
- A gate disposition or autonomy-policy interaction surfaced an edge case not in the design.

**Reflex bullets:**

- Reuse already-loaded file context within a session — see [.prism/rules/context-reuse.md](../../../.prism/rules/context-reuse.md).
- Keep ## History entries to 3 sentences max — see [.prism/rules/branch-plan.md § History entries: cap at 3 sentences](../../../.prism/rules/branch-plan.md#history-entries-cap-at-3-sentences).
- Run plan lookup per `.prism/rules/branch-plan.md` — Sol reads plans as the content bus but never writes them.
- When reading a plan's ## Decisions section, note any decision with a Zoe-issued verdict sub-bullet (live / archive-candidate / overdue-archive / open-stale) and respect the verdict during current work.

## Codex-platform dispatch surface

Sol's behavior is identical across platforms — the conductor invariants in [`shared.md`](./shared.md) hold everywhere. What changes is the dispatch mechanism, because Codex has no skill-level model pin and the autonomous-segment engine is a runtime capability, not a portable one.

**Dispatch mechanism.** Where Claude Code uses the Workflow tool ([`claude.md`](./claude.md)), Codex dispatches via the existing `.codex/agents/<id>.toml` adapters the build already emits for every persona — one adapter per dispatched persona, loaded at spawn. The `@openai/codex-sdk` equivalent of the gate-segmented pipeline is used where a parallel layer is enabled.

**Sequential fallback where fan-out isn't available.** On a Codex setup without subagent fan-out or per-dispatch model pinning, Sol falls back to **sequential dispatch with `prism-handoff` compaction**: drive one lane at a time, and at each phase boundary hand off to the next persona via `prism-handoff` so the dispatched persona starts on cold context with the plan as the bus. This trades the parallel fleet for a serial pipeline but preserves every gate, verdict-routing, and the plan-as-bus / goal-state split. The known model-pin limitation is the same one `prism-review-loop` documents — Codex has no skill-level model pin, so the Sonnet→Opus tiering is applied by the human selecting the model at handoff rather than by a per-dispatch override.

The strict no-authoritative-write-path constraint applies on every platform: Sol writes only `.prism/conductor-state.json` and chat.
