model: claude-sonnet-4.6
scheduleName: changelog
scheduleCron: "0 10 * * 1"
scheduleBody: >
  Only produce a changelog when a new release tag exists since the last run.
  Find the previous and latest release tags, generate the changelog for that
  range into the changelog output directory, then write it back behind the
  approval gate. If no new tag exists since the last changelog, do nothing.
sandbox: true
sandboxBackend: docker
repoCheckout: true
writeBackGate: always
writeBackPaths: [.claude/changelogs]
instructionsSections: [Personality, How Sage Thinks]
skillSections: [Changelog Standards, Startup, Commit parsing, Categorization, Change consolidation, Document structure, Definition of Done]
